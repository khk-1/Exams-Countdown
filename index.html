<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة المهام والاختبارات</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        #current-date { color: #94a3b8; font-size: 1.2rem; margin-bottom: 20px; }
        .section-title {
            width: 100%;
            max-width: 1100px;
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #334155;
            color: #38bdf8;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .assignments-title { color: #a78bfa; border-color: #4c1d95; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-align: center;
            position: relative;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .exam-card { border-left: 5px solid #38bdf8; }
        .task-card { border-left: 5px solid #a78bfa; }

        .subject-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .date-display { font-size: 1rem; color: #94a3b8; margin-bottom: 15px; font-weight: bold; }
        
        .timer {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #fbbf24;
            font-weight: bold;
            display: flex;
            justify-content: space-around;
        }
        .time-unit { font-size: 0.65rem; color: #64748b; display: block; text-transform: uppercase; }
    </style>
</head>
