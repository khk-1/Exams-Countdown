<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عداد الايتي | لوحة المتابعة الحديثة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090d16; 
    --bg-gradient: radial-gradient(circle at 50% 0%, #141f36 0%, #090d16 100%);
    --card: rgba(22, 32, 54, 0.7); 
    --card-hover: rgba(30, 45, 77, 0.9);
    --border: rgba(255, 255, 255, 0.05); 
    --border2: rgba(255, 255, 255, 0.12);
    --accent: #4f46e5; 
    --accent2: #818cf8;
    --text: #f8fafc; 
    --text2: #94a3b8; 
    --text3: #64748b;
    --success: #10b981; 
    --danger: #ef4444;
    --card-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
  }
  
  .light {
    --bg: #f8fafc; 
    --bg-gradient: radial-gradient(circle at 50% 0%, #eff6ff 0%, #f8fafc 100%);
    --card: rgba(255, 255, 255, 0.85); 
    --card-hover: rgba(255, 255, 255, 1);
    --border: rgba(0, 0, 0, 0.04); 
    --border2: rgba(0, 0, 0, 0.08);
    --accent: #4f46e5; 
    --accent2: #4f46e5;
    --text: #0f172a; 
    --text2: #475569; 
    --text3: #94a3b8;
    --success: #059669; 
    --danger: #dc2626;
    --card-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.05);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  
  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    background-image: var(--bg-gradient);
    color: var(--text);
    min-height: 100vh; 
    transition: background .3s, color .3s; 
    overflow-x: hidden;
    padding-bottom: 120px;
  }

  .container { max-width: 1000px; margin: 0 auto; padding: 2.5rem 1.5rem; position: relative; z-index: 1; }

  header { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    margin-bottom: 3.5rem; 
    border-bottom: 1px solid var(--border2);
    padding-bottom: 1.5rem;
  }
  
  .logo { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent2); position: relative; }
  .logo span::after {
    content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 3px;
    background: var(--accent2); border-radius: 2px;
  }
  
  .theme-btn {
    background: var(--card); border: 1px solid var(--border2); border-radius: 14px;
    padding: 10px 14px; font-size: 18px; cursor: pointer; transition: all .3s ease;
    box-shadow: var(--card-shadow);
  }
  .theme-btn:hover { border-color: var(--accent2); transform: scale(1.05); }

  .subjects-grid {
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    gap: 24px; 
    margin-bottom: 2rem;
  }

  .subject-card {
    background: var(--card); 
    border: 1px solid var(--border); 
    border-radius: 24px;
    padding: 1.75rem; 
    transition: all .3s cubic-bezier(0.4, 0, 0.2, 1); 
    position: relative; 
    overflow: hidden;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: var(--card-shadow);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  
  .subject-card::before {
    content: ''; position: absolute; top: 0; right: 0; width: 6px; height: 100%;
    opacity: 0.8; transition: opacity .3s;
  }
  .subject-card:hover { 
    border-color: var(--border2); 
    transform: translateY(-5px); 
    background: var(--card-hover);
    box-shadow: 0 20px 40px -15px rgba(0,0,0,0.6);
  }
  .subject-card:hover::before { opacity: 1; }
  .subject-card.urgent { border-color: rgba(239, 68, 68, 0.3); }
  .subject-card.urgent::before { animation: pulse-bar 1.5s infinite; }
  
  @keyframes pulse-bar { 0%,100% { opacity:0.5 } 50% { opacity:1 } }

  /* ألوان مبهجة ومميزة لكل مادة */
  .subject-card[data-idx="0"]::before { background: #818cf8; }
  .subject-card[data-idx="1"]::before { background: #34d399; }
  .subject-card[data-idx="2"]::before { background: #60a5fa; }
  .subject-card[data-idx="3"]::before { background: #fb923c; }
  .subject-card[data-idx="4"]::before { background: #f472b6; }
  .subject-card[data-idx="5"]::before { background: #a78bfa; }

  .subject-card[data-idx="0"] .subject-code { color: #818cf8; background: rgba(129, 140, 248, 0.1); }
  .subject-card[data-idx="1"] .subject-code { color: #34d399; background: rgba(52, 211, 153, 0.1); }
  .subject-card[data-idx="2"] .subject-code { color: #60a5fa; background: rgba(96, 165, 250, 0.1); }
  .subject-card[data-idx="3"] .subject-code { color: #fb923c; background: rgba(251, 146, 60, 0.1); }
  .subject-card[data-idx="4"] .subject-code { color: #f472b6; background: rgba(244, 114, 182, 0.1); }
  .subject-card[data-idx="5"] .subject-code { color: #a78bfa; background: rgba(167, 139, 250, 0.1); }

  .card-top { margin-bottom: 12px; }
  
  .subject-code {
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 8px;
    display: inline-block; margin-bottom: 12px;
  }
  
  .subject-name { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  
  .subject-date {
    font-size: 13px; color: var(--text2); margin-bottom: 1.5rem;
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  }
  .subject-date .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); }
  
  .optional-tag {
    font-size: 11px; font-weight: 600; color: #fbbf24;
    background: rgba(251,191,36,0.1); border-radius: 6px;
    padding: 2px 8px; margin-right: auto;
  }

  .countdown-display { display: flex; gap: 8px; margin-top: auto; }
  
  .time-block {
    flex: 1; background: rgba(0, 0, 0, 0.15); border-radius: 14px; padding: 10px 4px;
    text-align: center; border: 1px solid var(--border);
    transition: background .3s;
  }
  .light .time-block { background: rgba(0, 0, 0, 0.03); }
  
  .time-num {
    font-size: 22px; font-weight: 700; color: var(--text); line-height: 1;
    font-variant-numeric: tabular-nums; display: block; margin-bottom: 4px;
  }
  .time-label { font-size: 10px; color: var(--text3); font-weight: 500; }

  .confetti-area { display: none; }
  .subject-card.finished .countdown-display { display: none; }
  .subject-card.finished .subject-date { display: none; }
  .subject-card.finished .confetti-area { display: block; width: 100%; margin-top: 10px; }

  .confetti-btn {
    width: 100%; background: rgba(16, 185, 129, 0.08);
    border: 1px dashed rgba(16, 185, 129, 0.4); border-radius: 14px;
    padding: 16px; cursor: pointer; font-family: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: all .2s;
  }
  .confetti-btn:hover { background: rgba(16, 185, 129, 0.15); transform: scale(1.02); border-color: rgba(16, 185, 129, 0.7); }
  .confetti-btn .cb-emoji { font-size: 26px; }
  .confetti-btn .cb-text { font-size: 13px; color: var(--success); font-weight: 600; }

  /* زر الدعاء التفاعلي السفلي */
  .sticky-tawfeeq {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .tawfeeq-circle {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); border: none;
    cursor: pointer; font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
    transition: all .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .tawfeeq-circle:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 30px rgba(79, 70, 229, 0.5); }
  .tawfeeq-circle:active { transform: scale(0.95); }
  .tawfeeq-circle.pressed { animation: pop .3s ease; }
  @keyframes pop { 0% {transform:scale(1)} 50% {transform:scale(1.15)} 100% {transform:scale(1)} }
  
  .tawfeeq-badge {
    background: var(--card); border: 1px solid var(--border2);
    border-radius: 50px; padding: 4px 16px;
    font-size: 13px; font-weight: 600; color: var(--text);
    font-variant-numeric: tabular-nums;
    box-shadow: var(--card-shadow);
    backdrop-filter: blur(5px);
  }

  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }

  .holiday-overlay {
    position: fixed; inset: 0; z-index: 997;
    background: rgba(9, 13, 22, 0.8);
    backdrop-filter: blur(20px);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  .holiday-overlay.show { display: flex; }
  .holiday-text {
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 700; color: #34d399;
    line-height: 1.2; margin-bottom: 1rem;
    animation: float 3s ease-in-out infinite;
    text-shadow: 0 0 40px rgba(52, 211, 153, 0.3);
  }

  @keyframes float { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-15px) } }

  .toast {
    position: fixed; bottom: 120px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card); border: 1px solid var(--border2); border-radius: 50px;
    padding: 12px 24px; font-size: 14px; color: var(--text); z-index: 1001;
    opacity: 0; transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    pointer-events: none; backdrop-filter: blur(10px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media(max-width:600px) {
    .subjects-grid { grid-template-columns: 1fr; gap: 16px; }
    .logo { font-size: 1.5rem; }
    .container { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div class="holiday-overlay" id="holiday-overlay">
  <div class="holiday-text">إجازة سعيدة والوعد الـ A+ 🎊</div>
</div>
<div class="toast" id="toast"></div>

<div class="sticky-tawfeeq">
  <button class="tawfeeq-circle" onclick="pressTawfeeq()" id="btn-tawfeeq" aria-label="الله يوفقنا">🤲</button>
  <div class="tawfeeq-badge" id="count-tawfeeq">—</div>
</div>

<div class="container">
  <header>
    <div class="logo">عداد <span>الايتي</span></div>
    <button class="theme-btn" onclick="toggleTheme()" id="theme-btn" aria-label="تبديل الثيم">🌙</button>
  </header>

  <div class="subjects-grid" id="subjects-grid"></div>
</div>

<script>
const SUBJECTS = [
  { code:'COE 351', name:'شبكات الحاسب',                   dateISO:'2026-06-04', time:'10:30', ampm:'ص', day:'الخميس' },
  { code:'MATH 319',name:'علم البيانات',                  dateISO:'2026-06-07', time:'10:30', ampm:'م', day:'الأحد', optional:true },
  { code:'IT 372',  name:'تنقيب وتخزين البيانات',          dateISO:'2026-06-09', time:'08:00', ampm:'ص', day:'الثلاثاء' },
  { code:'IT 315',  name:'البرمجة الشيئية',                dateISO:'2026-06-11', time:'13:00', ampm:'م', day:'الخميس' },
  { code:'IT 342',  name:'الحوسبة السحابية والمتنقلة',     dateISO:'2026-06-14', time:'13:00', ampm:'م', day:'الأحد' },
  { code:'IT 362',  name:'مهارات اتصال وأخلاقيات المهنة',  dateISO:'2026-06-16', time:'10:30', ampm:'ص', day:'الثلاثاء' },
];

const API_BASE = 'https://abacus.jasoncameron.dev';
const NS = 'aadat-alIT-1447';
const ONE_HOUR = 3600000;

let isLight = localStorage.getItem('theme') === 'light';
if (isLight) document.documentElement.classList.add('light');
document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';

function to12hr(time, ampm) {
  const [h, m] = time.split(':').map(Number);
  const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ampm}`;
}

function examFinished(s) {
  const examDate = new Date(s.dateISO + 'T' + s.time + ':00').getTime();
  return (Date.now() - examDate) >= ONE_HOUR;
}

function renderSubjects() {
  const grid = document.getElementById('subjects-grid');
  grid.innerHTML = SUBJECTS.map((s, i) => {
    const finished = examFinished(s);
    const examDate = new Date(s.dateISO + 'T' + s.time + ':00').getTime();
    const diff = examDate - Date.now();
    const urgent = !finished && diff > 0 && diff < 86400000 * 2;

    return `<div class="subject-card${finished?' finished':''}${urgent?' urgent':''}" data-idx="${i}" id="card-${i}">
      <div class="card-top">
        <span class="subject-code">${s.code}</span>
        <div class="subject-name">${s.name}</div>
        <div class="subject-date">
          <span>${s.day}</span><span class="dot"></span><span>${s.dateISO}</span><span class="dot"></span>
          <span>الساعة ${to12hr(s.time, s.ampm)}</span>
          ${s.optional ? '<span class="optional-tag">اختيارية</span>' : ''}
        </div>
      </div>
      <div class="countdown-display">
        <div class="time-block"><span class="time-num" id="d-${i}">—</span><span class="time-label">يوم</span></div>
        <div class="time-block"><span class="time-num" id="h-${i}">—</span><span class="time-label">ساعة</span></div>
        <div class="time-block"><span class="time-num" id="m-${i}">—</span><span class="time-label">دقيقة</span></div>
        <div class="time-block"><span class="time-num" id="s-${i}">—</span><span class="time-label">ثانية</span></div>
      </div>
      <div class="confetti-area">
        <button class="confetti-btn" onclick="launchConfetti()">
          <span class="cb-emoji">🎉</span>
          <span class="cb-text">انتهى الاختبار! اضغط للاحتفال</span>
        </button>
      </div>
    </div>`;
  }).join('');
}

function updateCountdowns() {
  const now = Date.now();
  SUBJECTS.forEach((s, i) => {
    const card = document.getElementById('card-' + i);
    if (!card) return;

    if (examFinished(s)) {
      if (!card.classList.contains('finished')) {
        card.classList.add('finished');
        card.classList.remove('urgent');
        launchConfetti();
        showToast('انتهى اختبار ' + s.name);
      }
      return;
    }

    const examMs = new Date(s.dateISO + 'T' + s.time + ':00').getTime();
    const diff = examMs - now;
    if (diff <= 0) return;

    const days  = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins  = Math.floor((diff % 3600000) / 60000);
    const secs  = Math.floor((diff % 60000) / 1000);
    const set = (id,v) => { const el=document.getElementById(id); if(el) el.textContent=String(v).padStart(2,'0'); };
    set('d-'+i,days); set('h-'+i,hours); set('m-'+i,mins); set('s-'+i,secs);
    card.classList.toggle('urgent', diff < 86400000 * 2);
  });

  const allDone = SUBJECTS.every((s) => examFinished(s));
  const overlay = document.getElementById('holiday-overlay');
  if (allDone && !overlay.classList.contains('show')) {
    overlay.classList.add('show');
    launchInfiniteConfetti();
  }
}

async function pressTawfeeq() {
  const btn = document.getElementById('btn-tawfeeq');
  const el  = document.getElementById('count-tawfeeq');
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 300);
  showToast('الله يوفق الجميع 🤍');
  try {
    const r = await fetch(`${API_BASE}/hit/${NS}/tawfeeq`);
    const d = await r.json();
    if (d.value != null) el.textContent = d.value.toLocaleString('ar-SA') + " دعوة بالتوفيق";
  } catch {}
}

async function loadCount() {
  try {
    const r = await fetch(`${API_BASE}/get/${NS}/tawfeeq`);
    const d = await r.json();
    if (d.value != null) document.getElementById('count-tawfeeq').textContent = d.value.toLocaleString('ar-SA') + " دعوة بالتوفيق";
  } catch {}
}

function toggleTheme() {
  isLight = !isLight;
  document.documentElement.classList.toggle('light', isLight);
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#818cf8','#34d399','#60a5fa','#fb923c','#f472b6','#a78bfa'];
  const pieces = Array.from({length:180}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 120,
    r: Math.random() * 7 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 6,
    vy: Math.random() * 5 + 2,
    rot: Math.random() * 360,
    vrot: (Math.random() - 0.5) * 10,
    life: 1,
  }));
  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12;
      p.rot += p.vrot; p.life -= 0.007;
      if (p.life <= 0 || p.y > canvas.height) return;
      alive = true;
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 2.2);
      ctx.restore();
    });
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  cancelAnimationFrame(frame);
  draw();
}

function launchInfiniteConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#818cf8','#34d399','#60a5fa','#fb923c','#f472b6','#a78bfa'];
  let pieces = [];
  function addPieces() {
    for (let i = 0; i < 8; i++) {
      pieces.push({
        x: Math.random() * canvas.width, y: -10,
        r: Math.random() * 7 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: (Math.random() - 0.5) * 5,
        vy: Math.random() * 4 + 2,
        rot: Math.random() * 360,
        vrot: (Math.random() - 0.5) * 8,
        life: 1,
      });
    }
  }
  setInterval(addPieces, 200);
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces = pieces.filter(p => p.life > 0 && p.y < canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.1;
      p.rot += p.vrot; p.life -= 0.005;
      ctx.save(); ctx.globalAlpha = p.life;
      ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 2.2);
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

renderSubjects();
updateCountdowns();
setInterval(updateCountdowns, 1000);
loadCount();
setInterval(loadCount, 10000);
</script>
</body>
</html>
