<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة المهام والاختبارات</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        #current-date { color: #94a3b8; font-size: 1.2rem; margin-bottom: 20px; }
        .section-title {
            width: 100%;
            max-width: 1100px;
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #334155;
            color: #38bdf8;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .assignments-title { color: #a78bfa; border-color: #4c1d95; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-align: center;
            position: relative;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .exam-card { border-left: 5px solid #38bdf8; }
        .task-card { border-left: 5px solid #a78bfa; }

        .subject-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .date-display { font-size: 1rem; color: #94a3b8; margin-bottom: 15px; font-weight: bold; }
        
        .timer {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #fbbf24;
            font-weight: bold;
            display: flex;
            justify-content: space-around;
        }
        .time-unit { font-size: 0.65rem; color: #64748b; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>🚀 لوحة المتابعة الدراسية</h1>
    <div id="current-date">جاري تحميل التاريخ الحالي...</div>

    <div class="section-title assignments-title">📝 الواجبات والكويزات</div>
    <div id="taskList" class="grid-container"></div>

    <div class="section-title">🎓 الاختبارات النهائية (Finals)</div>
    <div id="examList" class="grid-container"></div>

    <script>
        // Display current date in header
        const today = new Date();
        document.getElementById('current-date').innerText = `اليوم: ${today.getDate()} / ${today.getMonth() + 1} / ${today.getFullYear()}`;

        // بيانات الواجبات والكويزات (يمكنك تركها فارغة أو إضافة عناصر بها)
        const tasks = [
            { name: "كويز شبكات تجريبي", date: "2026-06-05T12:00:00", display: "5 / 6" }
        ];

        // بيانات الاختبارات النهائية
        const exams = [
            { name: "Theory Networks", date: "2026-06-04T08:00:00", display: "4 / 6" },
            { name: "IOT", date: "2026-06-07T08:00:00", display: "7 / 6" },
            { name: "Tanqeeb", date: "2026-06-09T08:00:00", display: "9 / 6" },
            { name: "Theory Programming", date: "2026-06-11T08:00:00", display: "11 / 6" },
            { name: "Cloud Computing", date: "2026-06-14T08:00:00", display: "14 / 6" },
            { name: "Ethics", date: "2026-06-16T08:00:00", display: "16 / 6" }
        ];

        function createCards(data, containerId, cardClass) {
            const container = document.getElementById(containerId);
            if (!container || !data || data.length === 0) {
                if (container) container.innerHTML = `<p style="color: #64748b; grid-column: 1/-1;">لا يوجد مهام حالياً الحلّية حلوة! ✨</p>`;
                return;
            }
            
            data.forEach((item, index) => {
                const id = `${containerId}-${index}`;
                container.innerHTML += `
                    <div class="card ${cardClass}">
                        <div class="subject-name">${item.name}</div>
                        <div class="date-display">موعدنا: ${item.display}</div>
                        <div class="timer" id="${id}">جاري الحساب...</div>
                    </div>
                `;
                startTimer(item.date, id);
            });
        }

        function startTimer(targetDate, elementId) {
            const countDownDate = new Date(targetDate).getTime();
            
            // Run instantly once before the interval starts so there's no delay
            updateTimer(); 

            const x = setInterval(updateTimer, 1000);

            function updateTimer() {
                const now = new Date().getTime();
                const distance = countDownDate - now;
                const timerElement = document.getElementById(elementId);

                if (!timerElement) {
                    clearInterval(x);
                    return;
                }

                if (distance < 0) {
                    clearInterval(x);
                    timerElement.innerHTML = "تم التسليم / بدأ الاختبار ✅";
                    return;
                }
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                timerElement.innerHTML = `
                    <div>${days}<span class="time-unit">يوم</span></div>
                    <div>${hours}<span class="time-unit">ساعة</span></div>
                    <div>${minutes}<span class="time-unit">دقيقة</span></div>
                    <div>${seconds}<span class="time-unit">ثانية</span></div>
                `;
            }
        }

        // تشغيل البطاقات بأمان
        createCards(tasks, 'taskList', 'task-card');
        createCards(exams, 'examList', 'exam-card');
    </script>
</body>
</html>
