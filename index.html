<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة المهام والاختبارات</title>
    <title>MONTH/DAY</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .section-title {
            width: 100%;
            max-width: 1100px;
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #334155;
            color: #38bdf8;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .assignments-title { color: #a78bfa; border-color: #4c1d95; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-align: center;
            position: relative;
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .exam-card { border-left: 5px solid #38bdf8; }
        .task-card { border-left: 5px solid #a78bfa; }

        .subject-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .date-display { font-size: 1rem; color: #94a3b8; margin-bottom: 15px; font-weight: bold; }
        
        .timer {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: #fbbf24;
            font-weight: bold;
            display: flex;
            justify-content: space-around;
        }
        .time-unit { font-size: 0.65rem; color: #64748b; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>🚀 لوحة المتابعة الدراسية</h1>

    <!-- قسم الواجبات والمهام (تظهر أولاً لأن مواعيدها أقرب) -->
    <div class="section-title assignments-title">📋 الواجبات والمهام القادمة</div>
    <div id="taskList" class="grid-container"></div>

    <!-- قسم الاختبارات النهائية -->
    <div class="section-title">🎓 الاختبارات النهائية (Finals)</div>
    <div id="examList" class="grid-container"></div>

    <script>
        // بيانات الاختبارات النهائية
        const exams = [
            { name: "Practical Networks & Programming", date: "2026-05-18T08:00:00", display: "18 / 5" },
            { name: "Theory Networks", date: "2026-06-04T08:00:00", display: "4 / 6" },
            { name: "IOT", date: "2026-06-07T08:00:00", display: "7 / 6" },
            { name: "Tanqeeb", date: "2026-06-09T08:00:00", display: "9 / 6" },
            { name: "Theory Programming", date: "2026-06-11T08:00:00", display: "11 / 6" },
            { name: "Cloud Computing", date: "2026-06-14T08:00:00", display: "14 / 6" },
            { name: "Ethics", date: "2026-06-16T08:00:00", display: "16 / 6" }
        ];

        // بيانات الواجبات والكويزات
        const tasks = [
            { name: "معمل شبكات كويز ٣ (1)", date: "2026-05-10T08:00:00", display: "10 / 5" },
            { name: "معمل شبكات كويز ٤ (2)", date: "2026-05-12T08:00:00", display: "12 / 5" },
            { name: "كويز نظري شبكات", date: "2026-05-13T08:00:00", display: "13 / 5" },
            { name: "بروجكت الحوسبه", date: "2026-05-18T08:00:00", display: "18 / 5" },
            { name: "اساينمنت العلم", date: "2026-05-25T08:00:00", display: "25 / 5" },
            { name: "مشروع الشبكات النظري", date: "2026-05-31T08:00:00", display: "31 / 5" },
            { name: "بحث شبكات عملي", date: "2026-06-02T08:00:00", display: "2 / 6" },
            { name: "بروجكت علم البيانات", date: "2026-06-02T08:00:00", display: "5 / 6" }
        ];

        function createCards(data, containerId, cardClass) {
            const container = document.getElementById(containerId);
            data.forEach((item, index) => {
                const id = `${containerId}-${index}`;
                container.innerHTML += `
                    <div class="card ${cardClass}">
                        <div class="subject-name">${item.name}</div>
                        <div class="date-display">موعدنا: ${item.display}</div>
                        <div class="timer" id="${id}">جاري الحساب...</div>
                    </div>
                `;
                startTimer(item.date, id);
            });
        }

        function startTimer(targetDate, elementId) {
            const countDownDate = new Date(targetDate).getTime();
            const x = setInterval(function() {
                const now = new Date().getTime();
                const distance = countDownDate - now;
                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById(elementId).innerHTML = "تم التسليم / بدأ الاختبار ✅";
                    return;
                }
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                document.getElementById(elementId).innerHTML = `
                    <div>${days}<span class="time-unit">يوم</span></div>
                    <div>${hours}<span class="time-unit">ساعة</span></div>
                    <div>${minutes}<span class="time-unit">دقيقة</span></div>
                    <div>${seconds}<span class="time-unit">ثانية</span></div>
                `;
            }, 1000);
        }

        // تشغيل البطاقات
        createCards(tasks, 'taskList', 'task-card');
        createCards(exams, 'examList', 'exam-card');
    </script>
</body>
</html>
