<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الاختبارات النهائية</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        .subtitle { margin-bottom: 30px; color: #94a3b8; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-align: center;
            position: relative;
        }
        .subject-name { font-size: 1.3rem; font-weight: bold; margin-bottom: 5px; color: #f1f5f9; }
        .exam-date { font-size: 1rem; color: #38bdf8; margin-bottom: 15px; font-weight: bold; }
        .timer {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #fbbf24;
            font-weight: bold;
            display: flex;
            justify-content: space-around;
        }
        .time-unit { font-size: 0.7rem; color: #94a3b8; display: block; }
    </style>
</head>
<body>

    <h1>⏳ العد التنازلي للفاينل</h1>
    <p class="subtitle">التواريخ بالميلادي (Day/Month)</p>

    <div id="examList" class="grid-container"></div>

    <script>
        // القائمة بنفس تواريخك بالضبط (ميلادي)
        const exams = [
            { name: "Practical Networks & Programming", date: "2026-05-18T08:00:00", displayDate: "18 / 5" },
            { name: "Theory Networks", date: "2026-06-04T08:00:00", displayDate: "4 / 6" },
            { name: "IOT", date: "2026-06-07T08:00:00", displayDate: "7 / 6" },
            { name: "Tanqeeb", date: "2026-06-09T08:00:00", displayDate: "9 / 6" },
            { name: "Theory Programming", date: "2026-06-11T08:00:00", displayDate: "11 / 6" },
            { name: "Cloud Computing", date: "2026-06-14T08:00:00", displayDate: "14 / 6" },
            { name: "Ethics", date: "2026-06-16T08:00:00", displayDate: "16 / 6" }
        ];

        const examList = document.getElementById('examList');

        exams.forEach((exam, index) => {
            const cardId = `timer-${index}`;
            
            examList.innerHTML += `
                <div class="card">
                    <div class="subject-name">${exam.name}</div>
                    <div class="exam-date">التاريخ: ${exam.displayDate}</div>
                    <div class="timer" id="${cardId}">جاري الحساب...</div>
                </div>
            `;
            startTimer(exam.date, cardId);
        });

        function startTimer(targetDate, elementId) {
            const countDownDate = new Date(targetDate).getTime();
            const x = setInterval(function() {
                const now = new Date().getTime();
                const distance = countDownDate - now;

                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById(elementId).innerHTML = "بدأ الاختبار! 📝";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById(elementId).innerHTML = `
                    <div>${days}<span class="time-unit">يوم</span></div>
                    <div>${hours}<span class="time-unit">ساعة</span></div>
                    <div>${minutes}<span class="time-unit">دقيقة</span></div>
                    <div>${seconds}<span class="time-unit">ثانية</span></div>
                `;
            }, 1000);
        }
    </script>
</body>
</html>
